<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — SaaS Suite</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0A0A0A;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Animated gradient background ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: opacity 2s ease;
      opacity: 0;
    }
    #bg-canvas.visible { opacity: 1; }

    /* ── Layout shell ── */
    #page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 20px 32px;
    }

    nav a {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    nav img {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      object-fit: contain;
      transition: opacity 0.2s;
    }
    nav img:hover { opacity: 0.8; }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px 32px;
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      margin-bottom: 28px;
      padding: 6px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(2rem, 8vw, 4.5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    /* Word-swap container — fixed height, words fade in/out on top of each other */
    .word-wrap {
      position: relative;
      display: block;
      height: 1.15em;
      overflow: visible;
    }

    .word-wrap .word {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      white-space: nowrap;
      background: linear-gradient(90deg, #fbbf24, #f472b6, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .word-wrap .word.active {
      opacity: 1;
    }

    /* ── Subheadline ── */
    .sub {
      margin-top: 20px;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.6);
      max-width: 480px;
      line-height: 1.6;
    }

    /* ── Form embed ── */
    .form-wrap {
      margin-top: 36px;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .form-wrap iframe {
      display: block;
      width: 100%;
      height: 284px;
      border: none;
      border-radius: 5px;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }

    footer::before {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(123,47,255,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .footer-bottom {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 32px;
      justify-content: center;
      align-items: center;
    }

    footer p, footer span {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }

    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      nav { padding: 16px 20px; }
      .hero { padding: 32px 16px 24px; }
    }
  </style>
</head>
<body>

  <!-- Animated gradient background -->
  <div id="bg-canvas"></div>

  <!-- Page shell -->
  <div id="page">

    <!-- Nav: logo top-right -->
    <nav>
      <a href="https://saassuite.com" target="_blank" rel="noopener">
        <img src="saassuite-logo.png" alt="SaaS Suite" />
      </a>
    </nav>

    <!-- Hero -->
    <main class="hero">

      <div class="badge">Coming Soon</div>

      <h1>
        Great things are
        <div class="word-wrap" id="wordWrap">
          <!-- words injected by JS -->
        </div>
      </h1>

      <p class="sub">Join our waitlist and get access to our on demand training.</p>

      <div class="form-wrap">
        <iframe
          src="https://link.saassuite.ai/widget/form/C5MdGJTp3gwF7vVLSrrA"
          id="inline-C5MdGJTp3gwF7vVLSrrA"
          data-layout="{'id':'INLINE'}"
          data-trigger-type="alwaysShow"
          data-trigger-value=""
          data-activation-type="alwaysActivated"
          data-activation-value=""
          data-deactivation-type="neverDeactivate"
          data-deactivation-value=""
          data-form-name="Basic Opt in line"
          data-height="284"
          data-layout-iframe-id="inline-C5MdGJTp3gwF7vVLSrrA"
          data-form-id="C5MdGJTp3gwF7vVLSrrA"
          title="Basic Opt in line"
        ></iframe>
      </div>

    </main>

    <!-- Footer -->
    <footer>
      <div class="footer-bottom">
        <p>© 2025 SaaSSuite.com · All rights reserved</p>
        <span class="status-dot">
          <span class="dot"></span>
          <span>All systems operational</span>
        </span>
        <p>Powered by SaaS Suite</p>
      </div>
    </footer>

  </div>

  <!-- GHL form embed script -->
  <script src="https://link.saassuite.ai/js/form_embed.js"></script>

  <script>
    /* ── Animated gradient background ── */
    (function () {
      const el = document.getElementById('bg-canvas');
      const gradientColors = [
        '#0A0A0A', '#2979FF', '#FF80AB', '#FF6D00', '#FFD600', '#00E676', '#3D5AFE'
      ];
      const gradientStops = [35, 50, 60, 70, 80, 90, 100];
      let width = 125;

      function animate() {
        const mobile = window.innerWidth < 640;
        const activeStops = mobile
          ? gradientStops.map(s => Math.round(s * 0.45))
          : gradientStops;
        const stopsStr = activeStops.map((s, i) => `${gradientColors[i]} ${s}%`).join(', ');
        const rx = mobile ? width * 1.4 : width;
        const ry = mobile ? width * 2.0 : width;
        el.style.background = `radial-gradient(${rx}% ${ry}% at 50% 20%, ${stopsStr})`;
        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);

      // Fade in after first paint
      requestAnimationFrame(() => {
        requestAnimationFrame(() => { el.classList.add('visible'); });
      });
    })();

    /* ── Fade word swapper ── */
    (function () {
      const words = ['ideating', 'developing', 'launching', 'monetizing'];
      const wrap = document.getElementById('wordWrap');

      // Create one element per word, all stacked
      const els = words.map(w => {
        const el = document.createElement('span');
        el.className = 'word';
        el.textContent = w;
        wrap.appendChild(el);
        return el;
      });

      let current = 0;
      els[current].classList.add('active');

      setInterval(() => {
        els[current].classList.remove('active');
        current = (current + 1) % words.length;
        els[current].classList.add('active');
      }, 2000);
    })();
  </script>

</body>
</html>
